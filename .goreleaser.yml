# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

builds:
  - main: .
    binary: motoko
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64

archives:
  - format: tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
